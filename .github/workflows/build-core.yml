name: build-core
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'core/**'
      - '.github/workflows/build-core.yml'
permissions:
  contents: read
  packages: write
jobs:
  image:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      # Run the full suite FIRST (incl. Testcontainers + ModularityTests) so a red test
      # fails the job before any image is built/published. Explicit, not relying on
      # build-image's implicit fork to the package phase.
      - name: Test (gate before image)
        working-directory: core
        run: ./mvnw -B clean verify
      - name: Build & publish image (Buildpacks -> ghcr)
        working-directory: core
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # -DskipTests: the suite already ran in the gate step above; don't run it twice.
        run: ./mvnw -B spring-boot:build-image -DskipTests -Dspring-boot.build-image.publish=true
