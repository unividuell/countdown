name: build-web
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'webapp-vue/**'
      - 'deploy/Caddyfile'
      - 'deploy/web.Dockerfile'
      - '.github/workflows/build-web.yml'
permissions:
  contents: read
  packages: write
jobs:
  image:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # Gate the image on lint + unit tests. The Docker build re-runs `pnpm build`
      # (vue-tsc type-check + vite build), so type errors also fail the build below;
      # this step adds eslint + Vitest, which the image build does NOT run.
      - name: Lint + test (gate before image)
        working-directory: webapp-vue
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm lint
          pnpm test
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push web image
        run: |
          docker build -f deploy/web.Dockerfile -t ghcr.io/unividuell/countdown-web:latest .
          docker push ghcr.io/unividuell/countdown-web:latest
