# Compose project name — otherwise derived from the dir (countdown.unividuell.org ->
# countdownunividuellorg). Yields countdown-postgres-1, countdown_default, etc.
name: countdown

services:
  postgres:
    image: 'postgres:18'
    environment:
      - 'POSTGRES_DB=app'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=admin'
    # Host port: POSTGRES_PORT unset -> '0' -> Docker picks a free port (no collisions
    # when running many projects at once). Set POSTGRES_PORT in .env for a STABLE port
    # (e.g. a fixed IntelliJ DB connection). Spring + external tools then share it.
    ports:
      - '${POSTGRES_PORT:-0}:5432'

  pgadmin:
    image: 'dpage/pgadmin4:latest'
    environment:
      # Desktop mode: single-user, NO pgAdmin login screen and no master-password prompt.
      - 'PGADMIN_CONFIG_SERVER_MODE=False'
      - 'PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False'
      # The desktop auto-login identity must match the user the entrypoint creates
      # (PGADMIN_DEFAULT_EMAIL); otherwise pgAdmin looks up its default
      # 'pgadmin4@pgadmin.org', doesn't find it, and returns 401.
      # PGADMIN_CONFIG_* values are written into a Python config file verbatim, so string
      # values must carry embedded quotes (booleans like False are valid Python as-is).
      - "PGADMIN_CONFIG_DESKTOP_USER='admin@local.dev'"
      - 'PGADMIN_DEFAULT_EMAIL=admin@local.dev'
      - 'PGADMIN_DEFAULT_PASSWORD=secret'
    # Bound to localhost only — desktop mode has no auth, so don't expose it on the network.
    # PGADMIN_PORT unset -> random; set it in .env for a stable URL.
    ports:
      - '127.0.0.1:${PGADMIN_PORT:-0}:80'
    # servers.json is injected as an inline config (no host bind mount), so it works
    # regardless of Docker Desktop file-sharing (the project lives under /opt).
    configs:
      - source: pgadmin_servers
        target: /pgadmin4/servers.json
    volumes:
      # persist pgAdmin state (incl. a saved DB password) across restarts
      - 'pgadmin-data:/var/lib/pgadmin'
    depends_on:
      - postgres

configs:
  pgadmin_servers:
    content: |
      {
        "Servers": {
          "1": {
            "Name": "countdown app (postgres)",
            "Group": "Servers",
            "Host": "postgres",
            "Port": 5432,
            "MaintenanceDB": "app",
            "Username": "admin",
            "SSLMode": "prefer"
          }
        }
      }

volumes:
  pgadmin-data:
